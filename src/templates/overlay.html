<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Captions</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --font-family: 'Segoe UI', system-ui, sans-serif;
            --font-size: 28px;
            --font-weight: 600;
            --text-color: #ffffff;
            --bg-color: rgba(0, 0, 0, 0.7);
            --stroke-color: #000000;
            --glow-color: rgba(0, 0, 0, 0.5);
            --glow-size: 4px;
            --padding: 12px 24px;
            --border-radius: 8px;
            --line-height: 1.4;
            --width: 90%;
            --max-width: 1200px;
            --max-height: 200px;
            --bottom: 10%;
            --top: 10%;
            --left: 5%;
            --right: 5%;
        }

        body {
            width: 100vw;
            height: 100vh;
            background: transparent;
            overflow: hidden;
            font-family: var(--font-family);
        }

        #caption-container {
            position: absolute;
            bottom: var(--bottom);
            left: 50%;
            transform: translateX(-50%);
            width: var(--width);
            max-width: var(--max-width);
            text-align: center;
            pointer-events: none;
        }

        #caption-text {
            display: inline-block;
            padding: var(--padding);
            background: var(--bg-color);
            border-radius: var(--border-radius);

            font-size: var(--font-size);
            font-weight: var(--font-weight);
            color: var(--text-color);
            line-height: var(--line-height);

            text-shadow:
                -1px -1px 0 var(--stroke-color),
                1px -1px 0 var(--stroke-color),
                -1px 1px 0 var(--stroke-color),
                1px 1px 0 var(--stroke-color),
                0 0 var(--glow-size) var(--glow-color);

            max-height: var(--max-height);
            overflow: hidden;

            opacity: 1;
            transition: opacity 0.3s ease;
        }

        #caption-text.hidden {
            opacity: 0;
        }

        #caption-text:empty::before {
            content: attr(data-placeholder);
            opacity: 0.3;
        }

        #caption-text.listening {
            animation: pulse 2s infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.8;
            }
        }

        .position-top #caption-container {
            top: var(--top);
            bottom: auto;
        }

        .position-center #caption-container {
            top: 50%;
            bottom: auto;
            transform: translate(-50%, -50%);
        }

        .position-left #caption-container {
            left: var(--left);
            transform: none;
            text-align: left;
        }

        .position-right #caption-container {
            left: auto;
            right: var(--right);
            transform: none;
            text-align: right;
        }

        #status-indicator {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #ff4444;
            opacity: 0;
            transition: opacity 0.3s;
        }

        #status-indicator.connected {
            background: #44ff44;
            opacity: 1;
        }

        #status-indicator.disconnected {
            background: #ff4444;
            opacity: 1;
        }
    </style>
</head>

<body>
    <div id="status-indicator"></div>
    <div id="caption-container">
        <div id="caption-text" data-placeholder=""></div>
    </div>

    <script>
        // Parse URL parameters and apply them as CSS variables
        const params = new URLSearchParams(window.location.search);
        const root = document.documentElement;

        // Helper to parse rgba
        function hexToRgba(hex, alpha) {
            const r = parseInt(hex.slice(1, 3), 16);
            const g = parseInt(hex.slice(3, 5), 16);
            const b = parseInt(hex.slice(5, 7), 16);
            return `rgba(${r},${g},${b},${alpha})`;
        }

        // Apply configuration from URL params
        function applyConfig() {
            // Font family
            if (params.has('font')) {
                root.style.setProperty('--font-family', `"${params.get('font')}", sans-serif`);
            }

            // Font size (just the number, add px)
            if (params.has('size')) {
                root.style.setProperty('--font-size', params.get('size') + 'px');
            }

            // Font weight
            if (params.has('weight')) {
                root.style.setProperty('--font-weight', params.get('weight'));
            }

            // Text color
            if (params.has('color')) {
                root.style.setProperty('--text-color', params.get('color'));
            }

            // Background color with opacity
            if (params.has('bg') && params.has('bg-op')) {
                const bg = params.get('bg');
                const op = parseInt(params.get('bg-op')) / 100;
                root.style.setProperty('--bg-color', hexToRgba(bg, op));
            }

            // Stroke color
            if (params.has('stroke')) {
                root.style.setProperty('--stroke-color', params.get('stroke'));
            }

            // Glow color with default opacity
            if (params.has('glow')) {
                const glow = params.get('glow');
                root.style.setProperty('--glow-color', hexToRgba(glow, 0.5));
            }

            // Glow size
            if (params.has('glow-size')) {
                root.style.setProperty('--glow-size', params.get('glow-size') + 'px');
            }

            // Border radius
            if (params.has('radius')) {
                root.style.setProperty('--border-radius', params.get('radius') + 'px');
            }

            // Padding
            if (params.has('hpad') && params.has('vpad')) {
                root.style.setProperty('--padding',
                    params.get('vpad') + 'px ' + params.get('hpad') + 'px');
            }

            // Line height
            if (params.has('lh')) {
                root.style.setProperty('--line-height', params.get('lh'));
            }

            // Position class
            const position = params.get('pos') || 'bottom';
            document.body.classList.add('position-' + position);
        }

        // Apply config on load
        applyConfig();

        // Get max lines setting
        const maxLines = parseInt(params.get('lines')) || 3;

        // WebSocket connection
        const wsProtocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
        const wsUrl = `${wsProtocol}//${window.location.host}/ws`;

        let ws = null;
        let reconnectInterval = 1000;
        let reconnectTimer = null;
        let captionText = document.getElementById('caption-text');
        let statusIndicator = document.getElementById('status-indicator');

        function connect() {
            if (ws) return;

            ws = new WebSocket(wsUrl);

            ws.onopen = () => {
                console.log('Connected to caption server');
                statusIndicator.className = 'connected';
                reconnectInterval = 1000;

                setInterval(() => {
                    if (ws.readyState === WebSocket.OPEN) {
                        ws.send('ping');
                    }
                }, 30000);
            };

            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                handleMessage(data);
            };

            ws.onclose = () => {
                console.log('Disconnected from caption server');
                statusIndicator.className = 'disconnected';
                ws = null;
                reconnectInterval = Math.min(reconnectInterval * 1.5, 30000);
                reconnectTimer = setTimeout(connect, reconnectInterval);
            };

            ws.onerror = (error) => {
                console.error('WebSocket error:', error);
            };
        }

        function handleMessage(data) {
            switch (data.type) {
                case 'caption':
                    updateCaption(data.text);
                    if (data.cancel_fade) {
                        cancelFadeOut();
                    }
                    break;
                case 'clear':
                    captionText.textContent = '';
                    captionText.classList.remove('hidden');
                    break;
                case 'fade_out':
                    startFadeOut(data.duration_ms || 500);
                    break;
                case 'status':
                    if (data.is_listening) {
                        captionText.classList.add('listening');
                    } else {
                        captionText.classList.remove('listening');
                    }
                    break;
                case 'pong':
                    break;
            }
        }

        function updateCaption(text) {
            captionText.textContent = text;

            if (maxLines > 0) {
                const lines = text.split('\n');
                if (lines.length > maxLines) {
                    captionText.textContent = lines.slice(-maxLines).join('\n');
                }
            }

            captionText.scrollTop = captionText.scrollHeight;
        }

        let fadeTimeout = null;

        function startFadeOut(durationMs) {
            cancelFadeOut();
            captionText.style.transition = `opacity ${durationMs}ms ease`;
            void captionText.offsetHeight;
            captionText.style.opacity = '0';

            fadeTimeout = setTimeout(() => {
                captionText.classList.add('hidden');
                captionText.style.opacity = '1';
                captionText.style.transition = 'opacity 0.3s ease';
            }, durationMs);
        }

        function cancelFadeOut() {
            if (fadeTimeout) {
                clearTimeout(fadeTimeout);
                fadeTimeout = null;
            }
            captionText.classList.remove('hidden');
            captionText.style.opacity = '1';
            captionText.style.transition = 'opacity 0.3s ease';
        }

        connect();

        window.addEventListener('beforeunload', () => {
            if (reconnectTimer) clearTimeout(reconnectTimer);
            if (fadeTimeout) clearTimeout(fadeTimeout);
            if (ws) ws.close();
        });
    </script>
</body>

</html>
